background-color=#181520
text-color=#F3EAF6
border-color=#2A2233
progress-color=over #251D31
width=420
height=110
padding=12
border-size=2
border-radius=12
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32
icons=1
markup=1
format=<b>%s</b>\n%b

[urgency=low]
background-color=#181520
text-color=#8D6CCF
border-color=#2A2233
default-timeout=3000

[urgency=normal]
background-color=#181520
text-color=#F3EAF6
border-color=#2A2233
default-timeout=5000

[urgency=high]
background-color=#181520
text-color=#FFF6FF
border-color=#FF8D9E
default-timeout=0

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
